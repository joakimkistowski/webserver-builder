name: Test
on:
  push:
    branches:
      - '*'
      - '!main'
  pull_request:
    branches:
      - 'main'
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: 17
        cache: 'maven'
        distribution: temurin
    - name: Build and Test
      run: mvn -B clean package